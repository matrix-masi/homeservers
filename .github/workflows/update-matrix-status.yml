name: Update Matrix homeserver status

on:
  push:
    branches: [main, master]
    paths-ignore:
      - "**.md"
      - ".github/**"
  schedule:
    # Run weekly on Sundays at 04:00 UTC
    - cron: "0 4 * * 0"
  workflow_dispatch:

jobs:
  update-status:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: false

      - name: Update homeserver status and generate online list
        run: node scripts/update-matrix-status.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add homeservers.json online-homeservers.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update Matrix homeserver status and online-homeservers.json"
            git push
          fi
